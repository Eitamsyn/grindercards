<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 130 330 420">
  <!-- V Syndicate vertical logo — transparent background, white ink (for dark backgrounds) -->

  <!-- LEFT ARM -->
  <polygon fill="white" points="
    130,155
    175,155
    310,470
    220,470
  "/>

  <!-- RIGHT ARM -->
  <polygon fill="white" points="
    355,155
    400,155
    310,470
    220,470
  "/>

  <!-- WEAVE mask: transparent cutout where right arm goes under left -->
  <polygon fill="transparent" points="
    252,275
    295,240
    305,300
    262,340
  "/>

  <!-- Diamond negative space -->
  <polygon fill="transparent" points="
    265,340
    240,390
    265,440
    290,390
  "/>

  <!-- SYNDICATE text -->
  <text
    x="265"
    y="565"
    text-anchor="middle"
    font-family="'Montserrat', 'Gotham', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="5"
    fill="white"
  >SYNDICATE</text>
  <text
    x="381"
    y="548"
    font-family="Arial, sans-serif"
    font-size="14"
    fill="white"
